<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Randel Youtube Karaoke</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #030303;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.5);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --dynamic-island-bg: #000000;
            --panel-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            width: 70vw;
            height: 70vw;
            background: var(--accent-color);
            border-radius: 50%;
            animation: move-1 35s infinite alternate ease-in-out;
            left: -20%;
            top: -20%;
            opacity: 0.5;
        }

        .blob:nth-child(2) {
            background: #5856d6;
            width: 60vw;
            height: 60vw;
            right: -20%;
            bottom: -10%;
            animation: move-2 45s infinite alternate ease-in-out;
            opacity: 0.4;
        }

        .blob:nth-child(3) {
            background: #ff2d55;
            width: 50vw;
            height: 50vw;
            left: 40%;
            top: -10%;
            animation: move-3 30s infinite alternate ease-in-out;
            opacity: 0.3;
        }

        @keyframes move-1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(40vw, 30vh) rotate(360deg) scale(1.1); }
        }

        @keyframes move-2 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
            100% { transform: translate(-50vw, -40vh) rotate(-360deg) scale(1); }
        }

        @keyframes move-3 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-30vw, 50vh) rotate(180deg) scale(1.2); }
        }

        /* Dynamic Island Style Header */
        .header-container {
            position: sticky;
            top: 16px;
            z-index: 1000;
            margin-bottom: 24px;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }

        .dynamic-island {
            background: var(--dynamic-island-bg);
            padding: 10px 24px;
            border-radius: 40px;
            min-width: 200px;
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: var(--transition-smooth);
            animation: islandFloat 6s ease-in-out infinite;
        }

        @keyframes islandFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        .dynamic-island h2 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dynamic-island.active {
            padding: 14px 32px;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.3), 0 15px 45px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(0, 122, 255, 0.4);
        }

        /* Glass Panel System */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--panel-shadow);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Buttons */
        button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button.primary {
            background: var(--accent-color);
            border: none;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        button.primary:hover {
            background: #0084ff;
            box-shadow: 0 12px 25px rgba(0, 122, 255, 0.5);
        }

        /* Layout */
        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            gap: 24px;
            padding: 0 20px 40px;
            box-sizing: border-box;
        }

        @media (min-width: 1000px) {
            .main-layout {
                flex-direction: row;
                align-items: flex-start;
                gap: 30px;
            }
        }

        .left-panel {
            flex: 2.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-width: 0; /* Prevent panel from overflowing container */
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-width: 0; /* Allow panel to shrink and handle text ellipsis */
            position: sticky;
            top: 100px;
            gap: 24px;
        }

        @media (max-width: 1000px) {
            .right-panel {
                position: static;
            }
            .main-layout {
                padding: 0 12px 40px;
                gap: 16px;
            }
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 40px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition-smooth);
        }

        .video-container:hover {
            border-color: rgba(0, 122, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 122, 255, 0.15), 0 30px 70px rgba(0, 0, 0, 0.8);
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .player-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            z-index: 2;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .welcome-content {
            padding: 20px;
            z-index: 4;
            position: relative;
            text-align: center;
        }
        .welcome-content h1 {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mic-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.5));
        }

        /* Visualizer */
        .visualizer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            pointer-events: none;
            z-index: 5;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4) 0%, transparent 100%);
        }

        #visualizerCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        .mic-status {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 100px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mic-status:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .mic-status.active {
            color: #4cd964;
            border-color: #4cd964;
            box-shadow: 0 0 15px rgba(76, 217, 100, 0.3);
        }

        /* Search & Controls */
        .search-container {
            width: 100%;
            max-width: 800px;
            padding: 8px;
            margin-bottom: 30px;
            display: flex;
            gap: 8px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-container:focus-within {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(0, 122, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 122, 255, 0.1), 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #searchInput {
            flex: 1;
            padding: 12px 30px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        #searchInput::placeholder {
            color: var(--text-tertiary);
        }

        .controls {
            margin-top: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .button-row {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .button-row button {
                width: 100%;
                font-size: 13px;
                padding: 12px;
            }
            .cancel-btn {
                grid-column: span 2;
            }
        }

        /* Volume & Progress */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        input[type=range] {
            accent-color: var(--accent-color);
            height: 4px;
            width: 120px;
        }


        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Queue List */
        .queue-container {
            padding: 24px;
            width: 100%;
        }

        .queue-container h3 {
            margin: 0 0 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .queue-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .queue-list li {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .queue-list li:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .song-thumb {
            width: 60px;
            height: 45px;
            border-radius: 12px;
            background: #111;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .song-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .next-tag {
            position: absolute;
            top: -8px;
            right: 12px;
            background: var(--accent-color);
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4);
            z-index: 2;
        }

        .queue-remove-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            width: 32px;
            height: 32px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .queue-list li:hover .queue-remove-btn {
            opacity: 1;
        }

        .queue-remove-btn:hover {
            background: #ff3b30;
            color: white;
            transform: scale(1.1);
        }

        .cancel-btn {
            background: rgba(255, 59, 48, 0.15) !important;
            border: 0.5px solid rgba(255, 59, 48, 0.3) !important;
            color: #ff453a !important;
        }

        .cancel-btn:hover {
            background: rgba(255, 59, 48, 0.25) !important;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.2);
        }

        /* Icons/Glyphs */
        .icon {
            font-size: 18px;
        }
        /* Shortcuts Legend */
        .shortcuts-legend {
            margin-top: 24px;
            padding: 24px;
            width: 100%;
        }

        .shortcuts-legend h4 {
            margin: 0 0 15px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .key {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 700;
            min-width: 32px;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4);
            font-size: 11px;
        }

        .score-meter-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
            padding-left: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-bar-bg {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #scoreBarFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #007aff, #00ffcc);
            transition: width 0.3s ease;
        }

        #liveScoreValue {
            font-size: 11px;
            font-weight: 700;
            color: #00ffcc;
            min-width: 25px;
        }

        /* Score Overlay */
        .score-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
            text-align: center;
            padding: 40px;
        }

        .score-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .score-rank {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-number {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
            background: linear-gradient(180deg, #fff 30%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.4));
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-overlay.active .score-rank,
        .score-overlay.active .score-number {
            transform: translateY(0) scale(1);
        }

        .score-message {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .score-actions {
            display: flex;
            gap: 16px;
        }
    </style>
</head>

<body>

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="header-container">
        <div id="dynamicIsland" class="dynamic-island">
            <h2 id="nowPlaying">Ready to Sing</h2>
            <div class="score-meter-container" id="scoreMeter" style="display: none;">
                <div class="score-bar-bg">
                    <div id="scoreBarFill"></div>
                </div>
                <span id="liveScoreValue">0</span>
            </div>
        </div>
    </div>

    <div class="search-container glass-panel">
        <input type="text" id="searchInput" placeholder="Search for a song...">
        <button class="primary" onclick="loadVideo(true)">Play Now</button>
        <button onclick="loadVideo(false)">Reserve</button>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="video-container" id="videoContainer">
                <div id="player"></div>
                
                <div id="scoreOverlay" class="score-overlay">
                    <div class="score-rank" id="finalRank">Rockstar</div>
                    <div class="score-number" id="finalScore">85</div>
                    <p class="score-message" id="finalMessage">Incredible performance!</p>
                    <div class="score-actions">
                        <button class="primary" onclick="closeScore()">Continue</button>
                        <button onclick="restartVideo(); closeScore()">Sing Again</button>
                    </div>
                </div>

                <div id="audioStatus" class="mic-status" onclick="toggleVisualizer()">
                    <span>🎙️</span> <span id="audioText">Hybrid Audio: Off</span>
                </div>
                <div class="visualizer-overlay">
                    <canvas id="visualizerCanvas"></canvas>
                </div>
                <div id="playerPlaceholder" class="player-placeholder">
                    <div class="welcome-content">
                        <div class="mic-icon">🎙️</div>
                        <h1>Karaoke Pro</h1>
                        <p style="color: var(--text-secondary)">Next Gen Glass Experience</p>
                    </div>
                </div>
            </div>

            <div class="controls glass-panel">
                <div class="button-row">
                    <button onclick="playVideo()"><span class="icon">▶️</span> Play</button>
                    <button onclick="pauseVideo()"><span class="icon">⏸️</span> Pause</button>
                    <button onclick="restartVideo()"><span class="icon">🔄</span> Restart</button>
                    <button onclick="cancelCurrentSong()" class="cancel-btn"><span class="icon">⏹️</span> Cancel</button>
                    <button onclick="toggleFullscreen()"><span class="icon">⛶</span> Full</button>
                </div>

                <div class="volume-control">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100"
                        oninput="changeVolume(this.value)">
                    <span>🔊</span>
                </div>
            </div>

        </div>

        <div class="right-panel">
            <div class="queue-container glass-panel">
                <h3>Up Next</h3>
                <ul class="queue-list" id="queueList">
                    <li>Queue is empty</li>
                </ul>
            </div>

            <div class="shortcuts-legend glass-panel">
                <h4>Shortcuts</h4>
                <div class="shortcut-grid">
                    <div class="shortcut-item"><span class="key">Z</span> <span>Play</span></div>
                    <div class="shortcut-item"><span class="key">X</span> <span>Pause</span></div>
                    <div class="shortcut-item"><span class="key">C</span> <span>Restart</span></div>
                    <div class="shortcut-item"><span class="key">B</span> <span>Cancel</span></div>
                    <div class="shortcut-item"><span class="key">F</span> <span>Full</span></div>
                    <div class="shortcut-item"><span class="key">↵</span> <span>Enter</span></div>
                    <div class="shortcut-item"><span class="key">⇧+↵</span> <span>Res</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        var player;
        var songQueue = [];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'rel': 0,
                    'iv_load_policy': 3,
                    'controls': 0,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (visualizerInitialized) {
                    showFinalScore();
                } else {
                    playNextInQueue();
                }
            }
        }

        function setNowPlaying(title) {
            const el = document.getElementById('nowPlaying');
            const placeholder = document.getElementById('playerPlaceholder');
            const island = document.getElementById('dynamicIsland');
            
            if (title) {
                el.innerText = "🎵 " + title;
                placeholder.classList.add('hidden');
                island.classList.add('active');
            } else {
                el.innerText = "Ready to Sing";
                placeholder.classList.remove('hidden');
                island.classList.remove('active');
            }
        }

        function playNextInQueue() {
            resetScore();
            if (songQueue.length > 0) {
                let nextSong = songQueue.shift();
                player.loadVideoById(nextSong.id);
                setNowPlaying(nextSong.title);
                updateQueueUI();
            } else {
                let videoData = player.getVideoData();
                if (videoData && videoData.video_id) {
                    player.cueVideoById(videoData.video_id);
                } else {
                    player.stopVideo();
                }
                setNowPlaying("");
            }
        }

        function removeFromQueue(index) {
            songQueue.splice(index, 1);
            updateQueueUI();
        }

        function updateQueueUI() {
            const list = document.getElementById('queueList');
            if (songQueue.length === 0) {
                list.innerHTML = '<li style="justify-content: center; color: var(--text-secondary); font-style: italic; border: none; background: transparent;">Queue is empty</li>';
                return;
            }
            list.innerHTML = '';
            songQueue.forEach((song, index) => {
                let li = document.createElement('li');
                
                if (index === 0) {
                    let tag = document.createElement('div');
                    tag.className = 'next-tag';
                    tag.innerText = 'Next Up';
                    li.appendChild(tag);
                }

                let img = document.createElement('img');
                img.className = 'song-thumb';
                img.src = song.thumbnail || `https://img.youtube.com/vi/${song.id}/mqdefault.jpg`;
                img.alt = '';

                let info = document.createElement('div');
                info.className = 'song-info';

                let title = document.createElement('span');
                title.className = 'song-title';
                title.innerText = song.title;

                let meta = document.createElement('div');
                meta.className = 'song-meta';
                meta.innerText = `Pos: ${index + 1} • Ready to sing`;

                info.appendChild(title);
                info.appendChild(meta);

                let removeBtn = document.createElement('button');
                removeBtn.className = 'queue-remove-btn';
                removeBtn.innerHTML = '✕';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeFromQueue(index);
                };

                li.appendChild(img);
                li.appendChild(info);
                li.appendChild(removeBtn);
                list.appendChild(li);
            });
        }

        function handleFoundVideo(id, playNow, title, thumbnail = null) {
            let songName = title || "Video: " + id;
            let thumbUrl = thumbnail || `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

            if (playNow) {
                resetScore();
                player.loadVideoById(id);
                setNowPlaying(songName);
            } else {
                songQueue.push({ id: id, title: songName, thumbnail: thumbUrl });
                updateQueueUI();

                let state = player.getPlayerState ? player.getPlayerState() : -1;
                if (state === YT.PlayerState.ENDED || state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
                    playNextInQueue();
                }
            }
        }

        function onPlayerReady() {
            startSync();
            player.setVolume(100);
        }

        function playVideo() {
            player.playVideo();
        }

        function pauseVideo() {
            player.pauseVideo();
        }

        function restartVideo() {
            resetScore();
            player.seekTo(0);
            player.playVideo();
        }

        function changeVolume(val) {
            if (player && player.setVolume) {
                player.setVolume(val);
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.error("Error attempting to enable fullscreen:", err);
                });
            } else {
                document.exitFullscreen();
            }
        }


        async function loadVideo(playNow = true) {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            let videoId = null;
            try {
                let url = new URL(query);
                if (url.hostname.includes('youtube.com')) {
                    videoId = url.searchParams.get('v');
                } else if (url.hostname === 'youtu.be') {
                    videoId = url.pathname.slice(1);
                }
            } catch (e) {
                // Not a valid URL
            }

            if (!videoId && query.length === 11 && !query.includes(' ')) {
                videoId = query;
            }

            if (videoId) {
                document.getElementById('searchInput').value = ""; // clear input after finding
                handleFoundVideo(videoId, playNow, "Direct Link / ID: " + videoId);
                return;
            }

            let searchBtn = document.querySelector('.search-container button');
            let originalText = searchBtn.innerText;
            searchBtn.innerText = "Searching...";
            searchBtn.disabled = true;
            let foundId = null;
            let foundTitle = null;

            // Automatically append "karaoke" if it's not already in the search
            let searchQuery = query;
            if (!searchQuery.toLowerCase().includes('karaoke')) {
                searchQuery += ' karaoke';
            }

            // =========================================================================
            // ⭐️ YOUTUBE DATA API (RECOMMENDED FOR PRODUCTION / NETLIFY)
            // To make search work reliably without CORS errors, 
            // replace "YOUR_API_KEY_HERE" with a free YouTube Data API v3 Key.
            // =========================================================================
            const YOUTUBE_API_KEY = "AIzaSyBthjxnP2yj4_3tLVFhVHqRi7TwP2_jUlI";

            // Make sure we have a valid-looking API key before trying
            if (YOUTUBE_API_KEY && YOUTUBE_API_KEY.length > 20 && !YOUTUBE_API_KEY.includes('YOUR_API_KEY')) {
                try {
                    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(searchQuery)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`);
                    if (res.ok) {
                        let data = await res.json();
                        if (data.items && data.items.length > 0) {
                            foundId = data.items[0].id.videoId;
                            foundTitle = data.items[0].snippet.title;
                        }
                    } else {
                        console.error("YouTube API Error:", await res.text());
                    }
                } catch (e) {
                    console.error("YouTube API Fetch Error", e);
                }
            }

            // Fallback to public proxies if no API key is provided
            if (!foundId) {
                const instances = [
                    'https://invidious.nerdvpn.de/api/v1/search?q=',
                    'https://invidious.lunar.icu/api/v1/search?q=',
                    'https://inv.tux.pizza/api/v1/search?q='
                ];

                const fetchSearch = async (url) => {
                    try {
                        let res = await fetch(url);
                        if (res.ok) {
                            let data = await res.json();
                            let items = data.items || data;
                            if (items && items.length > 0) {
                                let video = items.find(item => item.type === "video" || item.videoId || (item.url && item.url.includes('/watch?v=')));
                                if (video) {
                                    foundTitle = video.title || "";
                                    return video.videoId || (video.url ? video.url.split('v=')[1] : null);
                                }
                                if (items[0].videoId) {
                                    foundTitle = items[0].title || "";
                                    return items[0].videoId;
                                }
                            }
                        }
                    } catch (e) { }
                    return null;
                };

                for (let baseUrl of instances) {
                    let targetUrl = baseUrl + encodeURIComponent(searchQuery);

                    // 1. Try direct fetch
                    foundId = await fetchSearch(targetUrl);
                    if (foundId) break;

                    // 2. Try via codetabs proxy
                    foundId = await fetchSearch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
                    if (foundId) break;

                    // 3. Try via allorigins proxy
                    try {
                        let res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                        if (res.ok) {
                            let wrapper = await res.json();
                            let data = JSON.parse(wrapper.contents);
                            let items = data.items || data;
                            if (items && items.length > 0) {
                                let video = items.find(item => item.type === "video" || item.videoId || (item.url && item.url.includes('/watch?v=')));
                                if (video) {
                                    foundId = video.videoId || (video.url ? video.url.split('v=')[1] : null);
                                    foundTitle = video.title || "";
                                }
                                if (!foundId && items[0].videoId) {
                                    foundId = items[0].videoId;
                                    foundTitle = items[0].title || "";
                                }
                                if (foundId) break;
                            }
                        }
                    } catch (e) { }
                }
            }

            searchBtn.innerText = originalText;
            searchBtn.disabled = false;

            if (foundId) {
                document.getElementById('searchInput').value = ""; // clear input after finding
                handleFoundVideo(foundId, playNow, foundTitle || searchQuery, foundId ? `https://img.youtube.com/vi/${foundId}/mqdefault.jpg` : null);
            } else {
                alert("Search failed. Please try a different song or paste a YouTube URL.");
            }
        }

        // =========================================================================
        // 🎙️ HYBRID REACTIVE VISUALIZER LOGIC (Mic + System/Tab Audio)
        // =========================================================================
        let audioContext;
        let micAnalyser;
        let systemAnalyser;
        let micDataArray;
        let systemDataArray;
        let micStream;
        let systemStream;
        let visualizerInitialized = false;
        let simTime = 0;

        // Scoring Variables
        let currentScore = 0;
        let totalSingingTime = 0;
        let scoreTrackingActive = false;
        let scoringInterval;

        async function toggleVisualizer() {
            const statusEl = document.getElementById('audioStatus');
            const textEl = document.getElementById('audioText');
            const scoreMeter = document.getElementById('scoreMeter');

            if (visualizerInitialized) {
                stopScoring();
                if (micStream) micStream.getTracks().forEach(track => track.stop());
                if (systemStream) systemStream.getTracks().forEach(track => track.stop());
                visualizerInitialized = false;
                statusEl.classList.remove('active');
                textEl.innerText = "Hybrid Audio: Off";
                scoreMeter.style.display = "none";
                return;
            }

            try {
                // 1. Request Microphone
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. Request System/Tab Audio
                systemStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1, height: 1 },
                    audio: true
                });

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                micAnalyser = audioContext.createAnalyser();
                micAnalyser.fftSize = 64;
                
                systemAnalyser = audioContext.createAnalyser();
                systemAnalyser.fftSize = 64;
                
                // Create sources
                const micSource = audioContext.createMediaStreamSource(micStream);
                const systemSource = audioContext.createMediaStreamSource(systemStream);
                
                micSource.connect(micAnalyser);
                systemSource.connect(systemAnalyser);
                
                micDataArray = new Uint8Array(micAnalyser.frequencyBinCount);
                systemDataArray = new Uint8Array(systemAnalyser.frequencyBinCount);
                
                visualizerInitialized = true;
                statusEl.classList.add('active');
                textEl.innerText = "Hybrid: Scoring Active";
                scoreMeter.style.display = "flex";

                // Stop the video track from systemStream
                systemStream.getVideoTracks().forEach(track => track.stop());
                
                startScoring();
                
            } catch (err) {
                console.error("Audio access denied:", err);
                alert("Scoring requires both Mic and System Audio access. Please allow both and ensure 'Share Audio' is checked!");
                
                if (micStream) micStream.getTracks().forEach(track => track.stop());
                if (systemStream) systemStream.getTracks().forEach(track => track.stop());
                visualizerInitialized = false;
            }
        }

        function startScoring() {
            if (scoringInterval) clearInterval(scoringInterval);
            scoringInterval = setInterval(updateScore, 200);
        }

        function stopScoring() {
            if (scoringInterval) clearInterval(scoringInterval);
            scoringInterval = null;
        }

        function updateScore() {
            if (!visualizerInitialized || !micAnalyser || !systemAnalyser) return;
            
            const isPlaying = player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING;
            if (!isPlaying) return;

            micAnalyser.getByteFrequencyData(micDataArray);
            systemAnalyser.getByteFrequencyData(systemDataArray);

            // Calculate Energy (RMS-like)
            let micEnergy = 0;
            for (let i = 0; i < micDataArray.length; i++) micEnergy += micDataArray[i];
            micEnergy /= micDataArray.length;

            let systemEnergy = 0;
            for (let i = 0; i < systemDataArray.length; i++) systemEnergy += systemDataArray[i];
            systemEnergy /= systemDataArray.length;

            // SCORING HEURISTIC:
            // 1. Minimum energy threshold to detect "singing"
            if (micEnergy > 30) {
                // 2. Points based on vocal intensity (max 0.5 per tick)
                let tickScore = Math.min(micEnergy / 150, 0.5);
                
                // 3. Rhythm Bonus: If mic energy matches music energy trends (simplified)
                if (systemEnergy > 50 && micEnergy > 60) {
                    tickScore += 0.2;
                }

                currentScore += tickScore;
                totalSingingTime += 0.2;
            }

            // Cap display score at 100 for live meter
            const displayScore = Math.min(Math.floor(currentScore), 100);
            document.getElementById('scoreBarFill').style.width = displayScore + "%";
            document.getElementById('liveScoreValue').innerText = displayScore;
        }

        function showFinalScore() {
            if (!visualizerInitialized) return;

            const score = Math.min(Math.floor(currentScore), 100);
            const overlay = document.getElementById('scoreOverlay');
            const scoreEl = document.getElementById('finalScore');
            const rankEl = document.getElementById('finalRank');
            const msgEl = document.getElementById('finalMessage');

            scoreEl.innerText = score;
            
            if (score >= 95) {
                rankEl.innerText = "Legendary";
                rankEl.style.color = "#ffcc00";
                msgEl.innerText = "Absolute masterpiece! You're a star!";
            } else if (score >= 85) {
                rankEl.innerText = "Rockstar";
                rankEl.style.color = "#007aff";
                msgEl.innerText = "Incredible performance! The crowd loves you!";
            } else if (score >= 70) {
                rankEl.innerText = "Pro";
                rankEl.style.color = "#4cd964";
                msgEl.innerText = "Great job! Your timing was excellent.";
            } else if (score >= 40) {
                rankEl.innerText = "Amateur";
                rankEl.style.color = "#ff9500";
                msgEl.innerText = "Not bad! Keep practicing to hit those high notes.";
            } else {
                rankEl.innerText = "Beginner";
                rankEl.style.color = "#ff3b30";
                msgEl.innerText = "Nice try! Sing louder and stay with the beat.";
            }

            overlay.classList.add('active');
            stopScoring();

            // Auto-continue to next song after 10 seconds if queue isn't empty
            if (songQueue.length > 0) {
                let secondsLeft = 10;
                msgEl.innerText = `Next song in ${secondsLeft}s...`;
                const timer = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0 || !overlay.classList.contains('active')) {
                        clearInterval(timer);
                        if (overlay.classList.contains('active')) closeScore();
                    } else {
                        msgEl.innerText = `Next song in ${secondsLeft}s...`;
                    }
                }, 500);
            }
        }

        function closeScore() {
            document.getElementById('scoreOverlay').classList.remove('active');
            playNextInQueue();
            if (visualizerInitialized) startScoring();
        }

        function resetScore() {
            currentScore = 0;
            totalSingingTime = 0;
            document.getElementById('scoreBarFill').style.width = "0%";
            document.getElementById('liveScoreValue').innerText = "0";
        }

        function drawVisualizer() {
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // Pre-fill if not yet initialized
            if (!systemDataArray) systemDataArray = new Uint8Array(32);

            function render() {
                requestAnimationFrame(render);
                simTime += 0.05;
                
                const isPlaying = player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING;
                
                if (visualizerInitialized && systemAnalyser) {
                    systemAnalyser.getByteFrequencyData(systemDataArray);
                } else {
                    // SIMULATION MODE
                    for (let i = 0; i < systemDataArray.length; i++) {
                        if (isPlaying) {
                            const wave = Math.sin(simTime + i * 0.3) * 0.5 + 0.5;
                            systemDataArray[i] = (wave + Math.random() * 0.2) * 150;
                        } else {
                            systemDataArray[i] = (Math.sin(simTime * 0.5 + i * 0.1) * 0.5 + 0.5) * 40;
                        }
                    }
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / systemDataArray.length) * 0.8;
                let x = 0;
                
                for (let i = 0; i < systemDataArray.length; i++) {
                    let barHeight = (systemDataArray[i] / 255) * canvas.height;
                    if (!isPlaying && visualizerInitialized) barHeight *= 0.1;

                    const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                    if (visualizerInitialized) {
                        gradient.addColorStop(0, 'rgba(0, 122, 255, 0.9)');
                        gradient.addColorStop(1, 'rgba(0, 200, 255, 0.5)');
                    } else {
                        gradient.addColorStop(0, 'rgba(0, 200, 255, 0.4)');
                        gradient.addColorStop(1, 'rgba(0, 255, 255, 0.1)');
                    }
                    
                    ctx.fillStyle = gradient;
                    const radius = barWidth / 2;
                    const barX = x + (canvas.width / systemDataArray.length - barWidth) / 2;
                    const barY = canvas.height - barHeight;
                    
                    if (barHeight > 1) {
                        ctx.beginPath();
                        ctx.roundRect(barX, barY, barWidth, barHeight, [radius, radius, 0, 0]);
                        ctx.fill();
                    }
                    x += canvas.width / systemDataArray.length;
                }
            }
            render();
        }

        // Start simulation immediately on load
        window.addEventListener('load', () => {
            drawVisualizer();
        });

        function startSync() {
            setInterval(() => {
                if (!player || !player.getCurrentTime) return;

                const currentTime = player.getCurrentTime();
                const duration = player.getDuration();

                if (duration) {
                    if (duration - currentTime <= 0.5 && player.getPlayerState() === YT.PlayerState.PLAYING) {
                        playNextInQueue();
                    }
                }

            }, 100);
        }

        function cancelCurrentSong() {
            resetScore();
            if (songQueue.length > 0) {
                playNextInQueue();
            } else {
                if (player && player.stopVideo) {
                    player.stopVideo();
                }
                setNowPlaying("");
            }
        }

        document.addEventListener('keydown', function (event) {
            const isInputFocused = document.activeElement === document.getElementById('searchInput');

            if (isInputFocused) {
                if (event.key === 'Enter') {
                    if (event.shiftKey) {
                        loadVideo(false);
                    } else {
                        loadVideo(true);
                    }
                }
                return;
            }

            switch (event.key.toLowerCase()) {
                case 'z': playVideo(); break;
                case 'x': pauseVideo(); break;
                case 'c': restartVideo(); break;
                case 'b': cancelCurrentSong(); break;
                case 'f': toggleFullscreen(); break;
            }
        });
    </script>
</body>
