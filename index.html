<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Randel Youtube Karaoke</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #000000;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #007aff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --dynamic-island-bg: #1c1c1e;
        }

        body {
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000000 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Dynamic Island Style Header */
        .header-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dynamic-island {
            background: var(--dynamic-island-bg);
            padding: 8px 20px;
            border-radius: 30px;
            min-width: 180px;
            max-width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dynamic-island h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
            color: var(--text-primary);
        }

        .dynamic-island.active {
            padding: 12px 30px;
            border-radius: 35px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
        }

        /* Glass Panel System */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 12px 48px 0 rgba(0, 0, 0, 0.6);
        }

        /* Buttons */
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px 28px;
            margin: 4px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.96);
        }

        button.primary {
            background: var(--accent-color);
            border: none;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        button.primary:hover {
            background: #0084ff;
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5);
        }

        /* Layout */
        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            gap: 24px;
            padding: 0 20px 40px;
            box-sizing: border-box;
        }

        @media (min-width: 1000px) {
            .main-layout {
                flex-direction: row;
                align-items: flex-start;
                gap: 30px;
            }
        }

        .left-panel {
            flex: 2.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: sticky;
            top: 100px;
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            z-index: 2;
            transition: opacity 0.8s ease;
        }
        .player-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .welcome-content {
            padding: 20px;
            z-index: 4;
            position: relative;
            text-align: center;
        }
        .welcome-content h1 {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mic-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.5));
        }

        /* Visualizer */
        .visualizer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            pointer-events: none;
            z-index: 5;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4) 0%, transparent 100%);
        }

        #visualizerCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        .mic-status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .mic-status.active {
            color: #4cd964;
        }

        /* Search & Controls */
        .search-container {
            width: 100%;
            max-width: 700px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        #searchInput {
            flex: 1;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .controls {
            margin-top: 20px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        /* Volume & Progress */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        input[type=range] {
            accent-color: var(--accent-color);
            height: 4px;
            width: 120px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            transition: width 0.1s linear;
        }

        /* Queue List */
        .queue-container {
            padding: 24px;
            width: 100%;
        }

        .queue-container h3 {
            margin: 0 0 20px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .queue-list {
            list-style: none;
            padding: 0;
        }

        .queue-list li {
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }

        .queue-list li:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
        }

        .song-title {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .remove-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 12px;
            border: none;
        }

        .remove-btn:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Icons/Glyphs */
        .icon {
            font-size: 18px;
        }
        /* Shortcuts Legend */
        .shortcuts-legend {
            margin-top: 24px;
            padding: 20px;
            width: 100%;
        }

        .shortcuts-legend h4 {
            margin: 0 0 15px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            min-width: 15px;
            text-align: center;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <div id="dynamicIsland" class="dynamic-island">
            <h2 id="nowPlaying">Ready to Sing</h2>
        </div>
    </div>

    <div class="search-container glass-panel">
        <input type="text" id="searchInput" placeholder="Search for a song...">
        <button class="primary" onclick="loadVideo(true)">Play Now</button>
        <button onclick="loadVideo(false)">Reserve</button>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="video-container" id="videoContainer">
                <div id="player"></div>
                <div id="micStatus" class="mic-status" onclick="toggleVisualizer()">
                    <span>🎤</span> <span id="micText">Mic Visualizer: Off</span>
                </div>
                <div class="visualizer-overlay">
                    <canvas id="visualizerCanvas"></canvas>
                </div>
                <div id="playerPlaceholder" class="player-placeholder">
                    <div class="welcome-content">
                        <div class="mic-icon">🎙️</div>
                        <h1>Karaoke Pro</h1>
                        <p style="color: var(--text-secondary)">Next Gen Glass Experience</p>
                    </div>
                </div>
            </div>

            <div class="controls glass-panel">
                <button onclick="playVideo()"><span class="icon">▶️</span> Play</button>
                <button onclick="pauseVideo()"><span class="icon">⏸️</span> Pause</button>
                <button onclick="restartVideo()"><span class="icon">🔄</span> Restart</button>
                <button onclick="playNextInQueue()"><span class="icon">⏭️</span> Next</button>
                <button onclick="toggleFullscreen()"><span class="icon">⛶</span> Full</button>

                <div class="volume-control">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100"
                        oninput="changeVolume(this.value)">
                    <span>🔊</span>
                </div>
            </div>

            <div class="progress-container" onclick="seekVideo(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="queue-container glass-panel">
                <h3>Up Next</h3>
                <ul class="queue-list" id="queueList">
                    <li>Queue is empty</li>
                </ul>
            </div>

            <div class="shortcuts-legend glass-panel">
                <h4>Shortcuts</h4>
                <div class="shortcut-grid">
                    <div class="shortcut-item"><span class="key">Z</span> <span>Play</span></div>
                    <div class="shortcut-item"><span class="key">X</span> <span>Pause</span></div>
                    <div class="shortcut-item"><span class="key">C</span> <span>Restart</span></div>
                    <div class="shortcut-item"><span class="key">V</span> <span>Next Song</span></div>
                    <div class="shortcut-item"><span class="key">F</span> <span>Fullscreen</span></div>
                    <div class="shortcut-item"><span class="key">↵</span> <span>Search & Play</span></div>
                    <div class="shortcut-item"><span class="key">⇧+↵</span> <span>Reserve</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        var player;
        var songQueue = [];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'rel': 0,
                    'iv_load_policy': 3,
                    'controls': 0,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                playNextInQueue();
            }
        }

        function setNowPlaying(title) {
            const el = document.getElementById('nowPlaying');
            const placeholder = document.getElementById('playerPlaceholder');
            const island = document.getElementById('dynamicIsland');
            
            if (title) {
                el.innerText = "🎵 " + title;
                placeholder.classList.add('hidden');
                island.classList.add('active');
            } else {
                el.innerText = "Ready to Sing";
                placeholder.classList.remove('hidden');
                island.classList.remove('active');
            }
        }

        function playNextInQueue() {
            if (songQueue.length > 0) {
                let nextSong = songQueue.shift();
                player.loadVideoById(nextSong.id);
                setNowPlaying(nextSong.title);
                updateQueueUI();
            } else {
                let videoData = player.getVideoData();
                if (videoData && videoData.video_id) {
                    player.cueVideoById(videoData.video_id);
                } else {
                    player.stopVideo();
                }
                setNowPlaying("");
            }
        }

        function removeFromQueue(index) {
            songQueue.splice(index, 1);
            updateQueueUI();
        }

        function updateQueueUI() {
            const list = document.getElementById('queueList');
            if (songQueue.length === 0) {
                list.innerHTML = '<li>Queue is empty</li>';
                return;
            }
            list.innerHTML = '';
            songQueue.forEach((song, index) => {
                let li = document.createElement('li');

                let titleSpan = document.createElement('span');
                titleSpan.className = 'song-title';
                titleSpan.innerText = (index + 1) + ". " + song.title;

                let removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerText = '❌ Remove';
                removeBtn.onclick = () => removeFromQueue(index);

                li.appendChild(titleSpan);
                li.appendChild(removeBtn);
                list.appendChild(li);
            });
        }

        function handleFoundVideo(id, playNow, title) {
            let songName = title || "Video: " + id;
            if (playNow) {
                player.loadVideoById(id);
                setNowPlaying(songName);
            } else {
                songQueue.push({ id: id, title: songName });
                updateQueueUI();

                let state = player.getPlayerState ? player.getPlayerState() : -1;
                // If unstarted, ended, or cued, we can auto-play the reserved song
                if (state === YT.PlayerState.ENDED || state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
                    playNextInQueue();
                }
            }
        }

        function onPlayerReady() {
            startSync();
            player.setVolume(100);
        }

        function playVideo() {
            player.playVideo();
        }

        function pauseVideo() {
            player.pauseVideo();
        }

        function restartVideo() {
            player.seekTo(0);
            player.playVideo();
        }

        function changeVolume(val) {
            if (player && player.setVolume) {
                player.setVolume(val);
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.error("Error attempting to enable fullscreen:", err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function seekVideo(event) {
            if (!player || !player.getDuration) return;
            const container = event.currentTarget;
            const rect = container.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percent = clickX / rect.width;
            const duration = player.getDuration();
            if (duration) {
                player.seekTo(duration * percent, true);
            }
        }

        async function loadVideo(playNow = true) {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            let videoId = null;
            try {
                let url = new URL(query);
                if (url.hostname.includes('youtube.com')) {
                    videoId = url.searchParams.get('v');
                } else if (url.hostname === 'youtu.be') {
                    videoId = url.pathname.slice(1);
                }
            } catch (e) {
                // Not a valid URL
            }

            if (!videoId && query.length === 11 && !query.includes(' ')) {
                videoId = query;
            }

            if (videoId) {
                document.getElementById('searchInput').value = ""; // clear input after finding
                handleFoundVideo(videoId, playNow, "Direct Link / ID: " + videoId);
                return;
            }

            let searchBtn = document.querySelector('.search-container button');
            let originalText = searchBtn.innerText;
            searchBtn.innerText = "Searching...";
            searchBtn.disabled = true;
            let foundId = null;
            let foundTitle = null;

            // Automatically append "karaoke" if it's not already in the search
            let searchQuery = query;
            if (!searchQuery.toLowerCase().includes('karaoke')) {
                searchQuery += ' karaoke';
            }

            // =========================================================================
            // ⭐️ YOUTUBE DATA API (RECOMMENDED FOR PRODUCTION / NETLIFY)
            // To make search work reliably without CORS errors, 
            // replace "YOUR_API_KEY_HERE" with a free YouTube Data API v3 Key.
            // =========================================================================
            const YOUTUBE_API_KEY = "AIzaSyBthjxnP2yj4_3tLVFhVHqRi7TwP2_jUlI";

            // Make sure we have a valid-looking API key before trying
            if (YOUTUBE_API_KEY && YOUTUBE_API_KEY.length > 20 && !YOUTUBE_API_KEY.includes('YOUR_API_KEY')) {
                try {
                    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(searchQuery)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`);
                    if (res.ok) {
                        let data = await res.json();
                        if (data.items && data.items.length > 0) {
                            foundId = data.items[0].id.videoId;
                            foundTitle = data.items[0].snippet.title;
                        }
                    } else {
                        console.error("YouTube API Error:", await res.text());
                    }
                } catch (e) {
                    console.error("YouTube API Fetch Error", e);
                }
            }

            // Fallback to public proxies if no API key is provided
            if (!foundId) {
                const instances = [
                    'https://invidious.nerdvpn.de/api/v1/search?q=',
                    'https://invidious.lunar.icu/api/v1/search?q=',
                    'https://inv.tux.pizza/api/v1/search?q='
                ];

                const fetchSearch = async (url) => {
                    try {
                        let res = await fetch(url);
                        if (res.ok) {
                            let data = await res.json();
                            let items = data.items || data;
                            if (items && items.length > 0) {
                                let video = items.find(item => item.type === "video" || item.videoId || (item.url && item.url.includes('/watch?v=')));
                                if (video) {
                                    foundTitle = video.title || "";
                                    return video.videoId || (video.url ? video.url.split('v=')[1] : null);
                                }
                                if (items[0].videoId) {
                                    foundTitle = items[0].title || "";
                                    return items[0].videoId;
                                }
                            }
                        }
                    } catch (e) { }
                    return null;
                };

                for (let baseUrl of instances) {
                    let targetUrl = baseUrl + encodeURIComponent(searchQuery);

                    // 1. Try direct fetch
                    foundId = await fetchSearch(targetUrl);
                    if (foundId) break;

                    // 2. Try via codetabs proxy
                    foundId = await fetchSearch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
                    if (foundId) break;

                    // 3. Try via allorigins proxy
                    try {
                        let res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                        if (res.ok) {
                            let wrapper = await res.json();
                            let data = JSON.parse(wrapper.contents);
                            let items = data.items || data;
                            if (items && items.length > 0) {
                                let video = items.find(item => item.type === "video" || item.videoId || (item.url && item.url.includes('/watch?v=')));
                                if (video) {
                                    foundId = video.videoId || (video.url ? video.url.split('v=')[1] : null);
                                    foundTitle = video.title || "";
                                }
                                if (!foundId && items[0].videoId) {
                                    foundId = items[0].videoId;
                                    foundTitle = items[0].title || "";
                                }
                                if (foundId) break;
                            }
                        }
                    } catch (e) { }
                }
            }

            searchBtn.innerText = originalText;
            searchBtn.disabled = false;

            if (foundId) {
                document.getElementById('searchInput').value = ""; // clear input after finding
                handleFoundVideo(foundId, playNow, foundTitle || searchQuery);
            } else {
                alert("Search failed due to strict browser CORS restrictions on Netlify. Please provide a YouTube API Key in the code, or paste a direct YouTube URL instead.");
            }
        }

        // =========================================================================
        // 🎙️ HYBRID REACTIVE VISUALIZER LOGIC
        // =========================================================================
        let audioContext;
        let analyser;
        let dataArray;
        let micStream;
        let visualizerInitialized = false;
        let simTime = 0;

        async function toggleVisualizer() {
            const statusEl = document.getElementById('micStatus');
            const textEl = document.getElementById('micText');

            if (visualizerInitialized) {
                // TURN OFF: Stop mic tracks and revert to simulation
                if (micStream) {
                    micStream.getTracks().forEach(track => track.stop());
                }
                visualizerInitialized = false;
                statusEl.classList.remove('active');
                textEl.innerText = "Mic Visualizer: Off";
                return;
            }

            // TURN ON: Request mic and start live mode
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const source = audioContext.createMediaStreamSource(micStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 64; 
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                source.connect(analyser);
                
                visualizerInitialized = true;
                statusEl.classList.add('active');
                textEl.innerText = "Mic Visualizer: Live";
            } catch (err) {
                console.error("Microphone access denied:", err);
                alert("Please allow microphone access for Live Mode!");
            }
        }

        function drawVisualizer() {
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // Pre-fill dataArray for simulation if not yet initialized
            if (!dataArray) dataArray = new Uint8Array(32);

            function render() {
                requestAnimationFrame(render);
                simTime += 0.05;
                
                const isPlaying = player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING;
                
                if (visualizerInitialized && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                } else {
                    // SIMULATION MODE: Create rhythmic wave patterns
                    for (let i = 0; i < dataArray.length; i++) {
                        if (isPlaying) {
                            // Rhythmic pulse
                            const wave = Math.sin(simTime + i * 0.3) * 0.5 + 0.5;
                            const noise = Math.random() * 0.2;
                            dataArray[i] = (wave + noise) * 150;
                        } else {
                            // Slow resting pulse
                            dataArray[i] = (Math.sin(simTime * 0.5 + i * 0.1) * 0.5 + 0.5) * 40;
                        }
                    }
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / dataArray.length) * 0.8;
                let x = 0;
                
                for (let i = 0; i < dataArray.length; i++) {
                    let barHeight = (dataArray[i] / 255) * canvas.height;
                    
                    if (!isPlaying && visualizerInitialized) barHeight *= 0.1;

                    const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                    // Live mode is blue, Simulation is a softer Cyan/Azure
                    if (visualizerInitialized) {
                        gradient.addColorStop(0, 'rgba(0, 122, 255, 0.9)');
                        gradient.addColorStop(1, 'rgba(0, 200, 255, 0.5)');
                    } else {
                        gradient.addColorStop(0, 'rgba(0, 200, 255, 0.4)');
                        gradient.addColorStop(1, 'rgba(0, 255, 255, 0.1)');
                    }
                    
                    ctx.fillStyle = gradient;
                    
                    const radius = barWidth / 2;
                    const barX = x + (canvas.width / dataArray.length - barWidth) / 2;
                    const barY = canvas.height - barHeight;
                    
                    if (barHeight > 1) {
                        ctx.beginPath();
                        ctx.roundRect(barX, barY, barWidth, barHeight, [radius, radius, 0, 0]);
                        ctx.fill();
                    }
                    
                    x += canvas.width / dataArray.length;
                }
            }
            render();
        }

        // Start simulation immediately on load
        window.addEventListener('load', () => {
            drawVisualizer();
        });

        function startSync() {
            setInterval(() => {
                if (!player || !player.getCurrentTime) return;

                const currentTime = player.getCurrentTime();
                const duration = player.getDuration();

                if (duration) {
                    const percent = (currentTime / duration) * 100;
                    document.getElementById("progressBar").style.width = percent + "%";

                    if (duration - currentTime <= 0.5 && player.getPlayerState() === YT.PlayerState.PLAYING) {
                        playNextInQueue();
                    }
                }

            }, 100);
        }

        document.addEventListener('keydown', function (event) {
            const isInputFocused = document.activeElement === document.getElementById('searchInput');

            if (isInputFocused) {
                if (event.key === 'Enter') {
                    if (event.shiftKey) {
                        loadVideo(false);
                    } else {
                        loadVideo(true);
                    }
                }
                return;
            }

            switch (event.key.toLowerCase()) {
                case 'z': playVideo(); break;
                case 'x': pauseVideo(); break;
                case 'c': restartVideo(); break;
                case 'v': playNextInQueue(); break;
                case 'f': toggleFullscreen(); break;
            }
        });
    </script>
</body>
</html>
